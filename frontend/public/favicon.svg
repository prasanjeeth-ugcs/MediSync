<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0d9488"/>
  <!-- Stethoscope simplified -->
  <!-- Ear piece circle -->
  <circle cx="10" cy="9" r="2.5" stroke="white" stroke-width="1.8" fill="none"/>
  <!-- Tube down and across -->
  <path d="M10 11.5 Q10 18 16 18 Q22 18 22 13" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Chest piece circle -->
  <circle cx="22" cy="11" r="3" stroke="white" stroke-width="1.8" fill="none"/>
  <circle cx="22" cy="11" r="1" fill="white"/>
  <!-- Heart cross symbol -->
  <rect x="14" y="21" width="2" height="7" rx="1" fill="white"/>
  <rect x="11.5" y="23.5" width="7" height="2" rx="1" fill="white"/>
</svg>
